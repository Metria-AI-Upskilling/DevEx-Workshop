<div class="w-80 shrink-0 flex flex-col overflow-y-auto p-4 border-r border-gray-200">
  <h2 class="text-xl font-semibold mb-4">My Markers</h2>

  <div class="flex gap-2 mb-4 flex-wrap">
    @for (f of filters; track f.value) {
      <button
        (click)="markerService.setFilter(f.value)"
        [class]="
          'px-4 py-2 text-sm font-medium rounded-md border transition-all cursor-pointer ' +
          (markerService.currentFilter() === f.value
            ? 'bg-blue-500 text-white border-blue-500'
            : 'bg-gray-100 text-gray-800 border-gray-200 hover:bg-gray-200')
        "
      >
        {{ f.label }}
      </button>
    }
  </div>

  <ul class="list-none space-y-2">
    @for (marker of markerService.filteredMarkers(); track marker.id) {
      <li class="flex items-center gap-2 p-3 border border-gray-200 rounded-md bg-gray-50 hover:bg-gray-100 transition-colors">

        @if (markerService.editingMarkerId() === marker.id) {
          <input
            #editInput
            type="text"
            [value]="editValue()"
            (input)="editValue.set($any($event.target).value)"
            (blur)="commitEdit(marker.id)"
            (keydown)="onEditKeydown($event, marker.id)"
            class="flex-1 min-w-0 px-2 py-0.5 border border-blue-400 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-100"
            autofocus
            aria-label="Edit marker name"
          />
        } @else {
          <span
            (click)="startEditing(marker.id, marker.name)"
            class="flex-1 min-w-0 text-sm break-words cursor-text hover:text-blue-500"
            title="Click to rename"
            role="button"
            [attr.aria-label]="'Rename ' + marker.name"
            tabindex="0"
            (keydown.enter)="startEditing(marker.id, marker.name)"
            (keydown.space)="startEditing(marker.id, marker.name)"
          >{{ marker.name }}</span>
        }

        <span
          (click)="markerService.focusMarker(marker.id)"
          class="shrink-0 text-xs text-gray-400 hover:text-blue-500 cursor-pointer select-none"
          title="Focus on map"
          aria-label="Focus marker on map"
        >⌖</span>

        <span
          (click)="markerService.toggleCategory(marker.id)"
          [class]="
            'shrink-0 text-xs px-2 py-0.5 rounded-full cursor-pointer select-none transition-all ' +
            (marker.category === 'favorites'
              ? 'bg-amber-100 text-amber-600'
              : marker.category === 'visited'
                ? 'bg-emerald-100 text-emerald-600'
                : 'bg-gray-200 text-gray-500')
          "
        >{{ marker.category === 'none' ? '—' : marker.category }}</span>

        <button
          (click)="markerService.deleteMarker(marker.id)"
          class="shrink-0 px-2 py-1 bg-red-500 hover:bg-red-600 active:bg-red-700 text-white text-xs font-medium rounded-md transition-colors cursor-pointer"
        >
          Delete
        </button>
      </li>
    }
  </ul>
</div>
