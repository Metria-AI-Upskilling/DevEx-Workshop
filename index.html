<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My Map</h1>
    </header>

    <main>
        <div id="sidebar">
            <h2>My Markers</h2>
            <div class="input-section">
                <input type="text" id="markerNameInput" placeholder="Click map, then name it...">
                <button id="clearSelectionBtn">Clear</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="favorites">Favorites</button>
                <button class="filter-btn" data-filter="visited">Visited</button>
            </div>

            <ul class="markerList" id="markerList"></ul>
        </div>

        <div id="map"></div>
    </main>

    <footer>
        <p>&copy; 2026</p>
    </footer>

    <script type="module" src="/main.js"></script>
</body>
</html>
